# Reverse proxy for the MDM service, terminating TLS in front of the
# fixed application port. The cert here is self-signed for local/dev
# verification only — production should use a CA-issued certificate
# (e.g. via certbot) once a real domain is available.

server {
    listen 443 ssl;
    server_name mdm.local;

    ssl_certificate     /etc/nginx/ssl/mdm-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/mdm-selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # nginx's own default (1m) is far below the app's MDM_MAX_UPLOAD_BYTES
    # default (100 MiB, src/mdm/config.py) — without this, nginx silently
    # 413s any upload over 1 MiB before it ever reaches the app's own limit
    # check. Set comfortably above the app default so the app's check (not
    # nginx's) is the actual authority; raise this too if that default ever
    # increases.
    client_max_body_size 200m;

    # The React SPA build. Everything that isn't one of the API path
    # prefixes below falls through here; try_files serves the matching
    # static asset (JS/CSS/etc.) or falls back to index.html so client-side
    # routes (e.g. /job/{id}) resolve correctly on a hard refresh or direct
    # link — see frontend/src/App.tsx for why those routes are deliberately
    # named to not collide with the API prefixes proxied below.
    root __REPO_DIR__/frontend/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # POST /documents runs PDF + local-LLM extraction synchronously (no
    # task queue yet — see docs/solution-brief.md), and now does so once
    # per domain (Supplier, Client, Product) sequentially in the same
    # request rather than once total. Observed real latency on this VM's
    # CPU-only inference is 50-90s per domain, and the app's own per-call
    # timeout (MDM_OLLAMA_EXTRACTION_TIMEOUT_SECONDS, src/mdm/config.py)
    # defaults to 280s — so three domains back-to-back can legitimately
    # take up to ~840s worst case. Budget comfortably above that so nginx
    # (not the app) is never the thing that gives up first; confirmed live
    # that a sub-300s budget produces a 504 after the backend would have
    # completed successfully. Scoped to this one route rather than raised
    # globally, so a genuine hang elsewhere still times out at the normal
    # default.
    location = /documents {
        proxy_pass http://127.0.0.1:__MDM_PORT__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # All other backend routes — this alternation must stay in sync with
    # the routers mounted in src/mdm/main.py (and with frontend/vite.config.ts's
    # API_PATHS, which proxies the same set for the dev server). Matching
    # "(/|$)" after the alternation avoids accidentally swallowing a future
    # SPA route that merely starts with the same substring (e.g. /auditor).
    location ~ ^/(jobs|duplicates|master-records|edit-requests|dashboard|auth|users|audit|health|ready)(/|$) {
        proxy_pass http://127.0.0.1:__MDM_PORT__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name mdm.local;
    return 301 https://$host$request_uri;
}
